<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPM Ultra Master | Roster Intelligence 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-in-out; opacity: 0; }
        .accordion-content.open { max-height: 4000px; opacity: 1; }
        .rotate-180 { transform: rotate(180deg); }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .input-pill { border: 1px solid #e2e8f0; border-radius: 12px; transition: all 0.2s; font-weight: 800; text-align: center; outline: none; }
        .input-pill:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); background: #f8fafc; }
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { background-color: #fef2f2; } 50% { background-color: #fee2e2; } }
        .input-edit { border-bottom: 2px solid transparent; transition: all 0.2s; cursor: text; font-weight: 800; }
        .input-edit:focus { border-bottom-color: #3b82f6; outline: none; background: #f8fafc; }
    </style>
</head>
<body class="bg-[#f8fafc] font-sans text-slate-900 p-4 md:p-8 min-h-screen uppercase">

<div class="max-w-[1600px] mx-auto space-y-6">
    <header class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200 flex flex-col lg:flex-row justify-between items-center gap-6">
        <div class="flex items-center gap-5">
            <div class="p-5 bg-blue-600 rounded-3xl shadow-xl shadow-blue-100">
                <i data-lucide="zap" class="text-white w-8 h-8"></i>
            </div>
            <div>
                <h1 class="text-3xl font-black tracking-tighter italic uppercase text-slate-800">CPM <span class="text-blue-600">Ultra</span></h1>
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em]">Strategic Resource Framework • 2026</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4 bg-slate-50 p-3 rounded-2xl border">
            <div id="countryGrid" class="flex gap-2 text-white"></div>
            <div class="h-8 w-[1px] bg-slate-200 mx-2"></div>
            <select id="targetMonth" onchange="runAnalysis()" class="bg-transparent font-black text-blue-600 text-sm outline-none cursor-pointer"></select>
        </div>
    </header>

    <div id="scoreboard" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <aside class="lg:col-span-4 space-y-4">
            
            <div class="bg-white rounded-[1.5rem] shadow-sm border overflow-hidden">
                <div onclick="toggleAcc('basics')" class="p-5 flex justify-between items-center cursor-pointer bg-slate-50/50 hover:bg-slate-50">
                    <span class="text-[11px] font-black uppercase tracking-widest flex items-center gap-3">
                        <i data-lucide="sliders" class="w-4 h-4 text-slate-500"></i> Global Basics
                    </span>
                    <i data-lucide="chevron-down" id="arrow-basics" class="w-4 h-4 transition-transform"></i>
                </div>
                <div id="sec-basics" class="accordion-content open p-6 space-y-6">
                    <div class="bg-slate-100 p-1.5 rounded-2xl flex gap-1">
                        <button onclick="setMode('volume')" id="btn-vol" class="flex-1 py-2 text-[10px] font-black rounded-xl transition-all bg-white text-blue-600 shadow-sm uppercase">Volume Mode</button>
                        <button onclick="setMode('hours')" id="btn-hrs" class="flex-1 py-2 text-[10px] font-black rounded-xl transition-all text-slate-500 uppercase">Hours Mode</button>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block" id="label-dailyTarget">Target Daily Volume (Tasks)</label>
                            <input type="number" id="dailyInput" value="5000" onchange="syncAll()" class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-black text-blue-600 outline-none">
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase mb-1 block">Total No. of CWs</label>
                            <input type="number" id="totalCWHeadcount" value="30" onchange="syncAll()" class="w-full p-2 bg-slate-50 border rounded-xl font-bold">
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase mb-1 block">Shift Fulfilment %</label>
                            <input type="number" id="fulfillment" value="100" onchange="runAnalysis()" class="w-full p-2 bg-slate-50 border rounded-xl font-bold">
                        </div>
                        <div class="col-span-2 border-t pt-2">
                            <label class="text-[9px] font-bold text-slate-400 uppercase mb-1 block">Global Forfeit %</label>
                            <input type="number" id="forfeit" value="10" onchange="validateRoster()" class="w-full p-2 bg-slate-50 border rounded-xl font-bold">
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[1.5rem] shadow-sm border overflow-hidden">
                <div onclick="toggleAcc('roster')" class="p-5 flex justify-between items-center cursor-pointer bg-slate-50/50 hover:bg-slate-50">
                    <span class="text-[11px] font-black uppercase tracking-widest flex items-center gap-3 text-emerald-600">
                        <i data-lucide="users-2" class="w-4 h-4"></i> Operational Availability
                    </span>
                    <i data-lucide="chevron-down" id="arrow-roster" class="w-4 h-4 transition-transform"></i>
                </div>
                <div id="sec-roster" class="accordion-content open p-6 space-y-4">
                    <div class="flex justify-between items-center bg-emerald-50 p-2 rounded-xl px-4 text-emerald-700">
                        <span class="text-[10px] font-black uppercase tracking-tighter">Num Shift Sections</span>
                        <input type="number" id="rosterCount" value="4" min="1" max="8" onchange="renderRoster()" class="w-12 p-1 bg-white border rounded text-center font-bold">
                    </div>
                    <div id="rosterContainer" class="space-y-2"></div>
                    
                    <div id="rosterStatusBox" class="p-3 rounded-xl space-y-2 bg-slate-50 border">
                        <div id="hcStatusLine" class="text-[10px] font-black flex justify-between uppercase"></div>
                        <div id="hrStatusLine" class="text-[10px] font-black flex justify-between uppercase"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[1.5rem] shadow-sm border overflow-hidden">
                <div onclick="toggleAcc('usecase')" class="p-5 flex justify-between items-center cursor-pointer bg-slate-50/50 hover:bg-slate-50">
                    <span class="text-[11px] font-black uppercase tracking-widest flex items-center gap-3 text-blue-600">
                        <i data-lucide="box" class="w-4 h-4"></i> Use Case Provision
                    </span>
                    <i data-lucide="chevron-down" id="arrow-usecase" class="w-4 h-4 transition-transform"></i>
                </div>
                <div id="sec-usecase" class="accordion-content open p-6 space-y-4">
                    <div class="flex justify-between items-center bg-blue-50 p-2 rounded-xl px-4 text-blue-700">
                        <span class="text-[10px] font-black uppercase tracking-tighter">Num Use Cases</span>
                        <input type="number" id="ucCount" value="2" min="1" max="12" onchange="renderUCs()" class="w-12 p-1 bg-white border rounded text-center font-bold">
                    </div>
                    <div class="grid grid-cols-3 gap-2 px-2 text-[8px] font-black text-slate-400 uppercase text-center italic">
                        <span>Daily Vol/Hrs</span>
                        <span>Avg AHT / Wt%</span>
                        <span>Buffer %</span>
                    </div>
                    <div id="ucContainer" class="space-y-3"></div>
                    <div id="ucValidation" class="p-3 rounded-xl text-[10px] font-black uppercase flex items-center justify-between"></div>
                </div>
            </div>

            <div id="shiftStratSec" class="bg-white rounded-[1.5rem] shadow-sm border overflow-hidden">
                <div onclick="toggleAcc('strat')" class="p-5 flex justify-between items-center cursor-pointer bg-slate-50/50 hover:bg-slate-50">
                    <span class="text-[11px] font-black uppercase tracking-widest flex items-center gap-3 text-purple-600">
                        <i data-lucide="clock" class="w-4 h-4"></i> Shift Breakdown
                    </span>
                    <i data-lucide="chevron-down" id="arrow-strat" class="w-4 h-4 transition-transform"></i>
                </div>
                <div id="sec-strat" class="accordion-content open p-6 space-y-4">
                    <div class="flex bg-slate-100 p-1 rounded-xl">
                        <button onclick="setShiftMode('number')" id="sModeNum" class="flex-1 py-1 text-[9px] font-black rounded-lg bg-white text-purple-600 shadow-sm uppercase">Numbers</button>
                        <button onclick="setShiftMode('percent')" id="sModePerc" class="flex-1 py-1 text-[9px] font-black rounded-lg text-slate-500 uppercase">Percent %</button>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Num Shift Blocks</span>
                        <input type="number" id="shiftBlockCount" value="2" min="1" max="12" onchange="renderShifts()" class="w-12 p-1 border rounded text-center font-bold">
                    </div>
                    <div id="shiftStratContainer" class="space-y-2 max-h-64 overflow-y-auto pr-1"></div>
                    <div id="stratValidation" class="p-3 rounded-xl text-[10px] font-black uppercase flex items-center justify-between"></div>
                </div>
            </div>
        </aside>

        <main class="lg:col-span-8 bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-8 border-b flex justify-between items-center bg-slate-50/50">
                <h3 class="text-xs font-black uppercase tracking-[0.4em] text-slate-400 italic italic">Weekly Production Timeline</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50/80 text-[10px] font-black uppercase tracking-widest text-slate-400 border-b">
                        <tr>
                            <th class="px-10 py-6 text-left">Period</th>
                            <th class="px-10 py-6 text-center">Net Working Days</th>
                            <th class="px-10 py-6 text-center">Demand Hours</th>
                            <th class="px-10 py-6 text-right">Target FTE</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 text-sm"></tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<script>
    const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const CODES = ['KE', 'NP', 'CO', 'PH'];

    let state = {
        mode: 'volume',
        shiftMode: 'number',
        activeMonth: new Date().getMonth(),
        selectedCountries: ['KE', 'NP', 'CO', 'PH'],
        allHolidays: {}
    };

    function toggleAcc(id) {
        document.getElementById(`sec-${id}`).classList.toggle('open');
        document.getElementById(`arrow-${id}`).classList.toggle('rotate-180');
    }

    function distributeInteger(total, count) {
        let base = Math.floor(total / count);
        let rem = Math.round(total % count);
        let arr = new Array(count).fill(base);
        for(let i=0; i<rem; i++) arr[i]++;
        return arr;
    }

    async function init() {
        const mSel = document.getElementById('targetMonth');
        MONTHS.forEach((m, i) => mSel.innerHTML += `<option value="${i}" ${i === state.activeMonth ? 'selected' : ''}>${m} 2026</option>`);
        
        const cG = document.getElementById('countryGrid');
        CODES.forEach(code => {
            cG.innerHTML += `<button onclick="toggleCountry('${code}')" id="tag-${code}" class="px-3 py-1.5 rounded-xl text-[10px] font-black border bg-blue-600 text-white border-blue-200 shadow-sm">${code}</button>`;
            fetchHolidays(code);
        });

        setTimeout(() => {
            syncAll();
            lucide.createIcons();
        }, 100);
    }

    function syncAll() {
        renderRoster();
        renderUCs();
        renderShifts();
        runAnalysis();
    }

    async function fetchHolidays(code) {
        try {
            const res = await fetch(`https://date.nager.at/api/v3/PublicHolidays/2026/${code}`);
            const data = await res.json();
            state.allHolidays[code] = data.map(h => h.date);
            runAnalysis();
        } catch (e) {}
    }

    function toggleCountry(code) {
        const btn = document.getElementById(`tag-${code}`);
        if (state.selectedCountries.includes(code)) {
            state.selectedCountries = state.selectedCountries.filter(c => c !== code);
            btn.className = "px-3 py-1.5 rounded-xl text-[10px] font-black border bg-white text-slate-400 border-slate-200";
        } else {
            state.selectedCountries.push(code);
            btn.className = "px-3 py-1.5 rounded-xl text-[10px] font-black border bg-blue-600 text-white border-blue-200 shadow-sm";
        }
        runAnalysis();
    }

    function setMode(m) {
        state.mode = m;
        document.getElementById('btn-vol').className = m === 'volume' ? 'flex-1 py-2 text-[10px] font-black rounded-xl transition-all bg-white text-blue-600 shadow-sm uppercase' : 'flex-1 py-2 text-[10px] font-black rounded-xl transition-all text-slate-500 uppercase';
        document.getElementById('btn-hrs').className = m === 'hours' ? 'flex-1 py-2 text-[10px] font-black rounded-xl bg-white text-blue-600 shadow-sm uppercase' : 'flex-1 py-2 text-[10px] font-black rounded-xl transition-all text-slate-500 uppercase';
        document.getElementById('label-dailyTarget').innerText = m === 'volume' ? 'Target Daily Volume (Tasks)' : 'Target Daily Hours';
        document.getElementById('shiftStratSec').style.display = m === 'volume' ? 'block' : 'none';
        syncAll();
    }

    function setShiftMode(m) {
        state.shiftMode = m;
        document.getElementById('sModeNum').className = m === 'number' ? 'flex-1 py-1 text-[9px] font-black rounded-lg bg-white text-purple-600 shadow-sm uppercase' : 'flex-1 py-1 text-[9px] font-black rounded-lg text-slate-500 uppercase';
        document.getElementById('sModePerc').className = m === 'percent' ? 'flex-1 py-1 text-[9px] font-black rounded-lg bg-white text-purple-600 shadow-sm uppercase' : 'flex-1 py-1 text-[9px] font-black rounded-lg text-slate-500 uppercase';
        renderShifts();
    }

    // ROSTER CONFIG - DESCENDING UNIQUE LOGIC
    function renderRoster() {
        let count = parseInt(document.getElementById('rosterCount').value);
        if (count > 8) count = 8;
        
        const cont = document.getElementById('rosterContainer');
        const totalHC = parseInt(document.getElementById('totalCWHeadcount').value) || 0;
        cont.innerHTML = '';
        const dist = distributeInteger(totalHC, count);

        for (let i = 0; i < count; i++) {
            // Sequential Descending: Row 1 = 8h, Row 2 = 7h, etc.
            let uniqueHr = 8 - i; 
            if (uniqueHr < 1) uniqueHr = 1; // Fallback if count somehow > 8

            cont.innerHTML += `
                <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="flex-1"><input type="number" value="${uniqueHr}" onchange="validateRoster()" class="roster-hrs-val w-full input-pill p-1.5 text-xs text-emerald-600 font-black"></div>
                    <div class="flex-1 text-center font-black text-slate-300">×</div>
                    <div class="flex-1"><input type="number" value="${dist[i]}" onchange="validateRoster()" class="roster-hc-val w-full input-pill p-1.5 text-xs text-slate-900 font-black"></div>
                </div>`;
        }
        validateRoster();
    }

    function validateRoster() {
        const targetHC = parseInt(document.getElementById('totalCWHeadcount').value) || 0;
        const targetDailyInput = parseFloat(document.getElementById('dailyInput').value) || 0;
        const forfeit = parseFloat(document.getElementById('forfeit').value) / 100;
        
        const hcInputs = document.querySelectorAll('.roster-hc-val');
        const hrInputs = document.querySelectorAll('.roster-hrs-val');

        let sumHC = 0;
        let sumHrs = 0;

        hcInputs.forEach((inp, i) => {
            let hc = parseInt(inp.value) || 0;
            let hr = parseFloat(hrInputs[i].value) || 0;
            sumHC += hc;
            sumHrs += (hc * hr);
        });

        const effectiveHrs = sumHrs * (1 - forfeit);
        const hcDiff = targetHC - sumHC;
        const demandDailyHrs = (state.mode === 'volume') ? (targetDailyInput * 0.25) : targetDailyInput;
        const hrDiff = effectiveHrs - demandDailyHrs;

        const hcLine = document.getElementById('hcStatusLine');
        const hrLine = document.getElementById('hrStatusLine');

        if (Math.abs(hcDiff) < 1) {
            hcLine.innerHTML = `<span>HC MATCHED</span> <span class="text-emerald-500">${sumHC} CWs</span>`;
        } else {
            hcLine.innerHTML = `<span>HC MISMATCH</span> <span class="text-red-500">${hcDiff > 0 ? 'SHORT' : 'OVER'}: ${Math.abs(hcDiff)}</span>`;
        }

        if (hrDiff >= 0) {
            hrLine.innerHTML = `<span>HOURS SURPLUS</span> <span class="text-emerald-600">+${hrDiff.toFixed(1)} HRS</span>`;
        } else {
            hrLine.innerHTML = `<span>HOURS DEFICIT</span> <span class="text-red-600 status-pulse">${hrDiff.toFixed(1)} HRS</span>`;
        }

        lucide.createIcons();
        runAnalysis();
    }

    function renderUCs() {
        const count = parseInt(document.getElementById('ucCount').value);
        const cont = document.getElementById('ucContainer');
        const target = parseFloat(document.getElementById('dailyInput').value) || 0;
        cont.innerHTML = '';
        const dist = distributeInteger(target, count);
        for (let i = 0; i < count; i++) {
            cont.innerHTML += `
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 space-y-3">
                    <input type="text" value="Use Case ${i+1}" class="w-full bg-transparent text-[10px] font-black text-blue-600 uppercase italic outline-none input-edit">
                    <div class="grid grid-cols-3 gap-2">
                        <input type="number" value="${dist[i]}" onchange="validateUCs()" class="uc-vol-input p-2 text-[11px] font-black border rounded-xl outline-none text-center bg-white">
                        <input type="number" value="15" onchange="runAnalysis()" class="p-2 text-[11px] font-black border rounded-xl outline-none text-center bg-white">
                        <input type="number" value="10" onchange="runAnalysis()" class="p-2 text-[11px] font-black border rounded-xl outline-none text-center bg-white">
                    </div>
                </div>`;
        }
        validateUCs();
    }

    function validateUCs() {
        const target = parseFloat(document.getElementById('dailyInput').value) || 0;
        const inputs = document.querySelectorAll('.uc-vol-input');
        let sum = 0; inputs.forEach(inp => sum += (parseFloat(inp.value) || 0));
        const diff = target - sum;
        const box = document.getElementById('ucValidation');
        if (Math.abs(diff) < 1) {
            box.innerHTML = `<span>Balanced</span> <i data-lucide="check-circle" class="w-3 h-3 text-emerald-500"></i>`;
            box.className = "p-3 rounded-xl text-[10px] font-black flex items-center justify-between bg-emerald-50 text-emerald-600 mt-2";
        } else {
            box.innerHTML = `<span>Off: ${Math.abs(diff).toFixed(0)}</span> <i data-lucide="alert-circle" class="w-3 h-3 pulse-red"></i>`;
            box.className = "p-3 rounded-xl text-[10px] font-black flex items-center justify-between bg-red-50 text-red-600 mt-2";
        }
        lucide.createIcons();
        runAnalysis();
    }

    function renderShifts() {
        const count = parseInt(document.getElementById('shiftBlockCount').value);
        const cont = document.getElementById('shiftStratContainer');
        const target = parseFloat(document.getElementById('dailyInput').value) || 0;
        cont.innerHTML = '';
        const dist = (state.shiftMode === 'number') ? distributeInteger(target, count) : new Array(count).fill((100 / count).toFixed(1));
        for (let i = 0; i < count; i++) {
            cont.innerHTML += `
            <div class="flex items-center gap-3 p-2 bg-slate-50 rounded-xl border border-slate-100">
                <input type="text" value="Shift ${i+1}" class="text-[9px] font-black text-purple-600 uppercase w-24 bg-transparent outline-none italic input-edit">
                <input type="number" value="${dist[i]}" onchange="validateShifts()" class="shift-input flex-1 bg-white p-1 text-xs font-black border rounded-lg outline-none text-center">
            </div>`;
        }
        validateShifts();
    }

    function validateShifts() {
        const target = state.shiftMode === 'number' ? parseFloat(document.getElementById('dailyInput').value) || 0 : 100;
        const inputs = document.querySelectorAll('.shift-input');
        let sum = 0; inputs.forEach(inp => sum += (parseFloat(inp.value) || 0));
        const diff = target - sum;
        const box = document.getElementById('stratValidation');
        if (Math.abs(diff) < 0.1) {
            box.innerHTML = `<span>Sync OK</span> <i data-lucide="check-circle" class="w-3 h-3 text-emerald-600"></i>`;
            box.className = "p-3 rounded-xl text-[10px] font-black flex items-center justify-between bg-emerald-50 text-emerald-600 mt-2";
        } else {
            box.innerHTML = `<span>Off by ${Math.abs(diff).toFixed(1)}</span> <i data-lucide="alert-triangle" class="w-3 h-3 pulse-red"></i>`;
            box.className = "p-3 rounded-xl text-[10px] font-black flex items-center justify-between bg-red-50 text-red-600 mt-2";
        }
        lucide.createIcons();
        runAnalysis();
    }

    function runAnalysis() {
        const dailyInput = parseFloat(document.getElementById('dailyInput').value) || 0;
        const fulfillment = parseFloat(document.getElementById('fulfillment').value) / 100;
        const forfeit = parseFloat(document.getElementById('forfeit').value) / 100;
        let supplyHrs = 0;
        document.querySelectorAll('.roster-hrs-val').forEach((el, i) => {
            supplyHrs += (parseFloat(el.value) || 0) * (parseFloat(document.querySelectorAll('.roster-hc-val')[i].value) || 0);
        });
        const netSupply = supplyHrs * (1 - forfeit);
        const mIdx = parseInt(document.getElementById('targetMonth').value);
        const weeks = getStrictWeeks(2026, mIdx);
        let activeHols = [];
        state.selectedCountries.forEach(c => { if(state.allHolidays[c]) activeHols.push(...state.allHolidays[c]); });
        activeHols = [...new Set(activeHols)];
        let totalD = 0;
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        weeks.forEach((w, i) => {
            const hols = w.dates.filter(d => activeHols.includes(d)).length;
            const netD = Math.max(0, w.workDays - hols);
            totalD += netD;
            const weeklyInput = (dailyInput * netD) / fulfillment;
            const demandHrs = (state.mode === 'volume') ? (weeklyInput * 0.25) : weeklyInput;
            const fte = (netD > 0) ? (demandHrs / (netD * 8)) : 0;
            tableBody.innerHTML += `
                <tr class="hover:bg-slate-50 border-b">
                    <td class="px-10 py-6 font-black italic">Week ${i+1}<br><span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${w.label}</span></td>
                    <td class="px-10 py-6 text-center text-xs font-black text-slate-600">${netD} Days</td>
                    <td class="px-10 py-6 text-center font-mono font-black text-blue-600">${Math.round(demandHrs)} HRS</td>
                    <td class="px-10 py-6 text-right"><span class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">${fte.toFixed(1)} FTE</span></td>
                </tr>`;
        });
        const dailyDemand = (state.mode === 'volume') ? (dailyInput * 0.25) : dailyInput;
        const variance = netSupply - dailyDemand;
        const sb = document.getElementById('scoreboard');
        const cards = [
            { label: state.mode === 'volume' ? 'Monthly Task Total' : 'Monthly Hour Total', val: (dailyInput * totalD).toLocaleString(), icon: 'target', color: 'text-blue-600' },
            { label: 'Daily Hour Demand', val: dailyDemand.toFixed(1) + ' HRS', icon: 'zap', color: 'text-blue-600' },
            { label: 'Roster Daily Supply', val: netSupply.toFixed(1) + ' HRS', icon: 'users-2', color: 'text-emerald-600' },
            { label: 'Shift Health (Hrs)', val: (variance >= 0 ? '+' : '') + variance.toFixed(1), icon: 'activity', color: variance >= 0 ? 'text-emerald-500' : 'text-red-500' }
        ];
        sb.innerHTML = cards.map(c => `
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 italic leading-none">${c.label}</p>
                <div class="flex items-center gap-3 mt-1"><i data-lucide="${c.icon}" class="w-4 h-4 ${c.color}"></i><h3 class="text-xl font-black">${c.val}</h3></div>
            </div>`).join('');
        lucide.createIcons();
    }

    function getStrictWeeks(y, m) {
        let weeks = [];
        let cur = new Date(y, m, 1);
        let last = new Date(y, m + 1, 0);
        while (cur <= last) {
            let start = new Date(cur);
            let weekDates = [];
            let workDays = 0;
            for (let i = 0; i < 7; i++) {
                if (cur.getMonth() !== m) break;
                weekDates.push(cur.toISOString().split('T')[0]);
                if (cur.getDay() !== 0 && cur.getDay() !== 6) workDays++;
                if (cur.getDay() === 0) { cur.setDate(cur.getDate()+1); break; }
                cur.setDate(cur.getDate()+1);
            }
            let end = new Date(cur); end.setDate(end.getDate()-1);
            weeks.push({ label: `${start.getDate()} - ${end.getMonth() === m ? end.getDate() : last.getDate()}`, dates: weekDates, workDays: workDays });
        }
        return weeks;
    }

    window.onload = init;
</script>
